document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display: flex; gap: 10px; margin-top: 2px;\">\n          <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"3\">\n            <div style=\"flex: 1; background: #F7F5EF; border: 1px solid #EAE6DC; border-radius: 8px; padding: 12px 14px; display: flex; flex-direction: column; gap: 4px;\">\n              <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 24px; font-weight: 600; letter-spacing: -0.01em; color: {{ k.color }}; line-height: 1;\">{{ k.pctStr }}<\u002Fspan>\n              <span style=\"font-size: 11.5px; color: #5b626c; line-height: 1.25;\">{{ k.label }}<\u002Fspan>\n              <span style=\"font-size: 10.5px; color: #9a9484; font-family: 'IBM Plex Mono', monospace; margin-top: 1px;\">{{ k.sub }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== BREAKDOWN TABLES ===== -->\n    <sc-for list=\"{{ tables }}\" as=\"t\" hint-placeholder-count=\"3\">\n      <div style=\"background: #FFFFFF; border: 1px solid #E7E3D9; border-radius: 12px; padding: 18px 20px 14px; display: flex; flex-direction: column; gap: 12px;\">\n        <div style=\"display: flex; align-items: baseline; justify-content: space-between; gap: 12px;\">\n          <div style=\"display: flex; flex-direction: column; gap: 3px; min-width: 0;\">\n            <span style=\"font-size: 15px; font-weight: 650; color: #1B2330; letter-spacing: -0.01em;\">{{ t.title }}<\u002Fspan>\n            <span style=\"font-size: 10.5px; color: #79808C; text-transform: uppercase; letter-spacing: 0.1em;\">{{ t.subtitle }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 10px; white-space: nowrap;\">\n            <sc-if value=\"{{ t.hasSel }}\" hint-placeholder-val=\"\">\n              <span onclick=\"{{ t.onClear }}\" style=\"cursor: pointer; font-size: 10.5p .sB4 }}\" title=\"Sort by 30d+\" style=\"font-size: 10px; color: {{ t.cB4 }}; text-align: right; font-family: 'IBM Plex Mono', monospace; cursor: pointer; user-select: none;\">30d+{{ t.aB4 }}<\u002Fspan>\n          <span onclick=\"{{ t.sAvg }}\" title=\"Sort by average age\" style=\"font-size: 10px; color: {{ t.cAvg }}; text-align: right; font-family: 'IBM Plex Mono', monospace; cursor: pointer; user-select: none;\">avg{{ t.aAvg }}<\u002Fspan>\n          <span onclick=\"{{ t.sTotal }}\" title=\"Sort by total\" style=\"font-size: 10px; color: {{ t.cTotal }}; text-align: right; font-family: 'IBM Plex Mono', monospace; cursor: pointer; user-select: none;\">total{{ t.aTotal }}<\u002Fspan>\n          <span onclick=\"{{ t.sPct }}\" title=\"Sort by %≤14\" style=\"font-size: 10px; color: {{ t.cPct }}; text-align: right; font-family: 'IBM Plex Mono', monospace; cursor: pointer; user-select: none;\">%≤14{{ t.aPct }}<\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"display: flex; flex-direction: column;\">\n          <sc-for list=\"{{ t.rows }}\" as=\"row\" hint-placeholder-count=\"6\">\n            <div style=\"display: grid; grid-template-columns: minmax(150px, 1.4fr) minmax(80px, 1fr) 40px 40px 44px 50px 44px 42px 46px 52px; align-items: center; gap: 9px; padding: 7px 2px; border-bottom: 1px solid #F1EEE6; background: {{ row.rowBg }}; box-shadow: inset 3px 0 0 {{ row.accentBar }};\">\n              <div onclick=\"{{ row.onToggle }}\" title=\"Filter by this row\" style=\"display: flex; align-items: center; gap: 8px; min-width: 0; cursor: pointer;\">\n                <span style=\"width: 14px; height: 14px; border-radius: 4px; border: 1.5px solid {{ row.boxBorder }}; background: {{ row.boxBg }}; display: flex; align-items: center; justify-content: center; flex: 0 0 auto;\">\n                  <span style=\"font-size: 9px; color: #fff; font-weight: 700; line-height: 1;\">{{ row.check }}<\u002Fspan>\n                <\u002Fspan>\n                <span title=\"{{ row.nam le-hover=\"text-decoration: {{ t.tot.ul1 }};\">{{ t.tot.c1 }}<\u002Fspan>\n          <span onclick=\"{{ t.tot.d2 }}\" title=\"{{ t.tot.t2 }}\" style=\"font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums; font-family: 'IBM Plex Mono', monospace; color: #1B2330; text-align: right; cursor: {{ t.tot.cur2 }};\" style-hover=\"text-decoration: {{ t.tot.ul2 }};\">{{ t.tot.c2 }}<\u002Fspan>\n          <span onclick=\"{{ t.tot.d3 }}\" title=\"{{ t.tot.t3 }}\" style=\"font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums; font-family: 'IBM Plex Mono', monospace; color: #D2603C; text-align: right; cursor: {{ t.tot.cur3 }};\" style-hover=\"text-decoration: {{ t.tot.ul3 }};\">{{ t.tot.c3 }}<\u002Fspan>\n          <span onclick=\"{{ t.tot.d4 }}\" title=\"{{ t.tot.t4 }}\" style=\"font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums; font-family: 'IBM Plex Mono', monospace; color: #9E2B36; text-align: right; cursor: {{ t.tot.cur4 }};\" style-hover=\"text-decoration: {{ t.tot.ul4 }};\">{{ t.tot.c4 }}<\u002Fspan>\n          <span style=\"font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums; font-family: 'IBM Plex Mono', monospace; color: #79808C; text-align: right;\">{{ t.tot.avgStr }}<\u002Fspan>\n          <span onclick=\"{{ t.tot.dAll }}\" title=\"See all issues\" style=\"font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums; font-family: 'IBM Plex Mono', monospace; color: #1B2330; text-align: right; cursor: pointer;\" style-hover=\"text-decoration: underline;\">{{ t.tot.count }}<\u002Fspan>\n          <span style=\"font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums; font-family: 'IBM Plex Mono', monospace; color: {{ t.tot.pctColor }}; text-align: right;\">{{ t.tot.pctStr }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n\n    <!-- ===== OLDEST ===== -->\n    <div style=\"background: #FFFFFF; border: 1px solid #E7E3D9; border-radius: 12px; padding: 18px 22px; display: flex; flex-direction: column; gap: 10px;\">\n      <div style=\"display: flex; align-items: baseline; justify-content: space-between;\">\n        <span style=\"font-size: 15px; font-weight: 650;\">Oldest open sales issues<\u002Fspan>\n        <span style=\"font-size: 11px; color: #9a9484; font-family: 'IBM Plex Mono', monospace;\">top 10 by action age<\u002Fspan>\n      <\u002Fdiv>\n      <sc-for list=\"{{ worst }}\" as=\"w\" hint-placeholder-count=\"10\">\n        <div style=\"display: grid; grid-template-columns: 52px 1.3fr 1.5fr 1fr 1.2fr; align-items: center; gap: 12px; padding: 7px 0; border-top: 1px solid #F0ECE2;\">\n          <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; font-weight: 600; color: #fff; background: {{ w.ageColor }}; border-radius: 5px; text-align: center; padding: 3px 0;\">{{ w.age }}d<\u002Fspan>\n          <span style=\"font-size: 12.5px;\">{{ w.homeowner }}<\u002Fspan>\n          <span style=\"font-size: 12px; color: #5b626c;\">{{ w.type }}<\u002Fspan>\n          <span style=\"font-size: 12px; color: #5b626c;\">{{ w.cra }}<\u002Fspan>\n          <span style=\"font-size: 12px; color: #9a9484; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ w.branch }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ===== DRILL-DOWN PANEL ===== -->\n  <sc-if value=\"{{ drillOpen }}\" hint-placeholder-val=\"\">\n    <div onclick=\"{{ closeDrill }}\" style=\"position: fixed; inset: 0; z-index: 120; background: rgba(27,35,48,0.42);\"><\u002Fdiv>\n    <div style=\"position: fixed; top: 0; right: 0; bottom: 0; z-index: 121; width: min(680px, 94vw); background: #FBF9F4; border-left: 1px solid #DAD4C7; box-shadow: -8px 0 40px rgba(27,35,48,0.18); display: flex; flex-direction: column;\">\n      <div style=\"padding: 20px 26px 16px; border-bottom: 1px solid #E7E3D9; display: flex; align-items: flex-start; gap: 14px;\">\n        <div style=\"display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0;\">\n          <span style=\"font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.12em; color: #9a9484; font-family: 'IBM Plex Mono', monospace;\">{{ drill.kicker }}<\u002Fspan>\n          <span style=\"font-size: 19px; font-weight: 700; letter-spacing: -0.01em; color: #1B2330;\">{{ drill.title }}<\u002Fspan>\n          <span style=\"font-size: 12px; color: #79808C; font-family: 'IBM Plex Mono', monospace;\">{{ drill.countLabel }} · avg {{ drill.avgStr }} days<\u002Fspan>\n        <\u002Fdiv>\n        <button onclick=\"{{ closeDrill }}\" style=\"cursor: pointer; font-size: 13px; font-weight: 600; color: #5b626c; background: #FFFFFF; border: 1px solid #DAD4C7; border-radius: 7px; padding: 7px 12px; font-family: inherit;\">Close ✕<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 56px 1.4fr 1.5fr 1.1fr; gap: 12px; padding: 9px 26px; border-bottom: 1px solid #E7E3D9; background: #F4F1EA;\">\n        <span style=\"font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: #9a9484; text-align: right; font-family: 'IBM Plex Mono', monospace;\">age<\u002Fspan>\n        <span style=\"font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: #9a9484;\">homeowner<\u002Fspan>\n        <span style=\"font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: #9a9484;\">type / agent<\u002Fspan>\n        <span style=\"font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: #9a9484;\">branch<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"flex: 1; overflow-y: auto; padding: 4px 26px 26px;\">\n        <sc-for list=\"{{ drill.rows }}\" as=\"d\" hint-placeholder-count=\"8\">\n          <div style=\"display: grid; grid-template-columns: 56px 1.4fr 1.5fr 1.1fr; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid #EEEAE0;\">\n            <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; font-weight: 600; color: #fff; background: {{ d.ageColor }}; border-radius: 5px; text-align: center; padding: 3px 0;\">{{ d.age }}d<\u002Fspan>\n            <div style=\"display: flex; flex-direction: column; gap: 1px; min-width: 0;\">\n              <span style=\"font-size: 13px; color: #1B2330; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ d.homeowner }}<\u002Fspan>\n              <span style=\"font-size: 10.5px; color: #b3a596; font-family: 'IBM Plex Mono', monospace;\">{{ d.id }} · proj {{ d.projectAge }}d<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display: flex; flex-direction: column; gap: 1px; min-width: 0;\">\n              <span style=\"font-size: 12px; color: #3a4250; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ d.type }}<\u002Fspan>\n              <span style=\"font-size: 11px; color: #8a8472; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ d.cra }}<\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"font-size: 11.5px; color: #79808C; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ d.branch }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = {\n    records: [],\n    filters: { type: [], cra: [], branch: [] },\n    sort: { type: { key: \"count\", dir: \"desc\" }, cra: { key: \"count\", dir: \"desc\" }, branch: { key: \"count\", dir: \"desc\" } },\n    drill: null,\n    fileName: \"—\", asOf: \"—\", error: \"\", loading: false,\n  };\n\n  componentDidMount() {\n    let loaded = false;\n    try {\n      const raw = localStorage.getItem(\"siDashData_v1\");\n      if (raw) {\n        const d = JSON.parse(raw);\n        if (d && d.records && d.records.length) {\n          this.setState({ records: d.records, fileName: d.fileName || \"saved data\", asOf: d.asOf || \"—\" });\n          loaded = true;\n        }\n      }\n    } catch (e) {}\n    if (!loaded) this.loadSeedWhenReady(0);\n    this._onDragOver = (e) => { e.preventDefault(); };\n    this._onDrop = (e) => {\n      e.preventDefault();\n      if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) this.ingest(e.dataTransfer.files);\n    };\n    window.addEventListener(\"dragover\", this._onDragOver);\n    window.addEventListener(\"drop\", this._onDrop);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener(\"dragover\", this._onDragOver);\n    window.removeEventListener(\"drop\", this._onDrop);\n  }\n\n  // Seed scripts may load slightly after mount (esp. in bundled/offline files);\n  // poll briefly until window.SI_SEED is available.\n  loadSeedWhenReady = (tries) => {\n    if (typeof window !== \"undefined\" && window.SI_SEED) { this.loadSeed(); return; }\n    if (tries > 150) { this.loadSeed(); return; }\n    setTimeout(() => this.loadSeedWhenReady(tries + 1), 20);\n  };\n\n  loadSeed = () => {\n    const seed = (typeof window !== \"undefined\" && window.SI_SEED) ? window.SI_SEED : [];\n    const meta = (typeof window !== \"undefined\" && window.SI_SEED_META) ? window.SI_SEED_META : { fileName: \"sample data\", asOf: \"—\" };\n    this.setState({ records: seed, fileName: meta.fileName, asOf: meta.asOf, error: \"\", filters: { type: [], cra: [], branch: [] } });\n    try { localStorage.removeItem(\"siDashData_v1\"); } catch (e) {}\n  };\n\n  toggleFilter = (dim, key) => {\n    this.setState((s) => {\n      const cur = (s.filters && s.filters[dim]) ? s.filters[dim].slice() : [];\n      const i = cur.indexOf(key);\n      if (i === -1) cur.push(key); else cur.splice(i, 1);\n      return { filters: Object.assign({}, s.filters, { [dim]: cur }) };\n    });\n  };\n  clearDim = (dim) => this.setState((s) => ({ filters: Object.assign({}, s.filters, { [dim]: [] }) }));\n  clearAll = () => this.setState({ filters: { type: [], cra: [], branch: [] } });\n\n  sortBy = (dim, key) => {\n    this.setState((s) => {\n      const cur = s.sort[dim] || { key: \"count\", dir: \"desc\" };\n      const next = cur.key === key\n        ? { key: key, dir: cur.dir === \"asc\" ? \"desc\" : \"asc\" }\n        : { key: key, dir: key === \"name\" ? \"asc\" : \"desc\" };\n      return { sort: Object.assign({}, s.sort, { [dim]: next }) };\n    });\n  };\n\n  openDrill = (kicker, title, records) => this.setState({ drill: { kicker, title, records } });\n  closeDrill = () => this.setState({ drill: null });\n\n  ingest = async (files) => {\n    if (!files || !files.length) return;\n    const file = files[0];\n    this.setState({ loading: true, error: \"\" });\n    try {\n      if (!window.SIParser) throw new Error(\"Parser not loaded yet — try again in a moment.\");\n      const res = await window.SIParser.parseFile(file);\n      if (!res.records.length) throw new Error(\"No rows with Action/Status containing \\u201CSales Issue\\u201D found in \" + file.name + \".\");\n      const asOf = new Date().toLocaleDateString(\"en-US\", { month: \"short\", day: \"numeric\", year: \"numeric\" });\n      this.setState({ records: res.records, fileName: file.name, asOf, loading: false, filters: { type: [], cra: [], branch: [] } });\n      try { localStorage.setItem(\"siDashData_v1\", JSON.stringify({ records: res.records, fileName: file.name, asOf })); } catch (e) {}\n    } catch (err) {\n      this.setState({ loading: false, error: (err && err.message) || String(err) });\n    }\n  };\n\n  onFile = (e) => { this.ingest(e.target.files); e.target.value = \"\"; };\n  resetData = () => this.loadSeed();\n\n  renderVals() {\n    const ALL = this.state.records || [];\n    const allCount = ALL.length;\n    const F = this.state.filters || { type: [], cra: [], branch: [] };\n    const SORT = this.state.sort || {};\n    const pass = (r, dim) => !F[dim].length || F[dim].indexOf(r[dim]) !== -1;\n    const RECS = ALL.filter((r) => pass(r, \"type\") && pass(r, \"cra\") && pass(r, \"branch\"));\n    const total = RECS.length;\n    const denom = Math.max(1, total);\n    const TARGET = 90;\n    const stop = (e) => { if (e && e.stopPropagation) e.stopPropagation(); };\n\n    // hero distribution: 6 bands\n    const HBANDS = [[0, 3], [4, 7], [8, 11], [12, 15], [16, 30], [31, 1e9]];\n    const HLABELS = [\"0–3d\", \"4–7d\", \"8–11d\", \"12–15d\", \"16–30d\", \"31d+\"];\n    const HPAL = [\"#2E9E66\", \"#7FB45C\", \"#E6B43E\", \"#E08A3C\", \"#D2603C\", \"#B23A48\"];\n    const hIdx = (a) => { for (let i = 0; i < HBANDS.length; i++) if (a >= HBANDS[i][0] && a <= HBANDS[i][1]) return i; return HBANDS.length - 1; };\n    const hCounts = [0, 0, 0, 0, 0, 0];\n    RECS.forEach((r) => { hCounts[hIdx(r.actionAge)]++; });\n    const heroDrill = (band) => {\n      const lo = HBANDS[band][0], hi = HBANDS[band][1];\n      const recs = RECS.filter((r) => r.actionAge >= lo && r.actionAge <= hi).slice().sort((a, b) => b.actionAge - a.actionAge);\n      this.openDrill(\"Action age\", HLABELS[band] + \" old\", recs);\n    };\n    const dist = hCounts.map((c, i) => {\n      const pct = c / denom * 100;\n      return { label: HLABELS[i], count: c, w: pct.toFixed(3) + \"%\", color: HPAL[i], barLabel: (c > 0 && pct >= 6) ? String(c) : \"\", cur: c > 0 ? \"pointer\" : \"default\", title: c > 0 ? (\"See \" + c + \" issue(s) · \" + HLABELS[i]) : \"\", onClick: c > 0 ? () => heroDrill(i) : null };\n    });\n\n    const cum = (d) => RECS.filter((r) => r.actionAge <= d).length;\n    const c3 = cum(3), c7 = cum(7), c14 = cum(14);\n    const p3 = c3 / denom * 100, p7 = c7 / denom * 100, p14 = c14 / denom * 100;\n    const pctColor = (p) => (p >= TARGET ? \"#2E9E66\" : p >= TARGET - 12 ? \"#C98A2E\" : \"#C0503B\");\n    const kpis = [\n      { label: \"of all sales issues are under 3 days old\", sub: c3 + \" of \" + total + \" issues\", pctStr: p3.toFixed(1) + \"%\", color: pctColor(p3) },\n      { label: \"of all sales issues are under 7 days old\", sub: c7 + \" of \" + total + \" issues\", pctStr: p7.toFixed(1) + \"%\", color: pctColor(p7) },\n      { label: \"of all sales issues are under 14 days old\", sub: c14 + \" of \" + total + \" issues\", pctStr: p14.toFixed(1) + \"%\", color: pctColor(p14) },\n    ];\n\n    // breakdown buckets: 0-3 / 4-7 / 8-14 / 15-29 / 30+\n    const bIdx = (a) => (a <= 3 ? 0 : a <= 7 ? 1 : a <= 14 ? 2 : a <= 29 ? 3 : 4);\n    const group = (field, records, shorten) => {\n      const m = new Map();\n      records.forEach((r) => {\n        const k = (r[field] || \"—\") || \"—\";\n        const e = m.get(k) || { key: k, name: k, count: 0, buckets: [0, 0, 0, 0, 0], ageSum: 0 };\n        e.count++;\n        e.buckets[bIdx(r.actionAge)]++;\n        e.ageSum += r.actionAge;\n        m.set(k, e);\n      });\n      return [...m.values()].map((e) => ({\n        key: e.key,\n        name: shorten ? shorten(e.name) : e.name,\n        count: e.count,\n        buckets: e.buckets,\n        avg: e.ageSum / e.count,\n        pct: (e.buckets[0] + e.buckets[1] + e.buckets[2]) / e.count * 100,\n      }));\n    };\n    const shortBranch = (b) => String(b)\n      .replace(/\\s*-\\s*LGCY Install\\s*/i, \" · \")\n      .replace(/\\s*:\\s*/g, \" · \")\n      .replace(/·\\s*·/g, \"· \")\n      .replace(/\\s{2,}/g, \" \")\n      .trim();\n\n    const subsetExcept = (excl) => ALL.filter((r) => [\"type\", \"cra\", \"branch\"].every((d) => d === excl || pass(r, d)));\n\n    // ---- drill-down ----\n    const BUCKET_RANGES = [[0, 3], [4, 7], [8, 14], [15, 29], [30, Infinity]];\n    const BUCKET_LABELS = [\"0–3 days\", \"4–7 days\", \"8–14 days\", \"15–29 days\", \"30+ days\"];\n    const DIM_NAMES = { type: \"Sales Issue Type\", cra: \"Client Relations Agent\", branch: \"Branch\" };\n    const ageColorOf = (a) => HPAL[hIdx(a)];\n    const drillRecords = (dim, key, bucketIdx) => {\n      let recs = subsetExcept(dim);\n      if (key != null) recs = recs.filter((r) => (r[dim] || \"—\") === key);\n      if (bucketIdx >= 0) {\n        const lo = BUCKET_RANGES[bucketIdx][0], hi = BUCKET_RANGES[bucketIdx][1];\n        recs = recs.filter((r) => r.actionAge >= lo && r.actionAge <= hi);\n      }\n      return recs.slice().sort((a, b) => b.actionAge - a.actionAge);\n    };\n    const makeDrillHandler = (dim) => (key, bucketIdx) => {\n      const recs = drillRecords(dim, key, bucketIdx);\n      const keyLabel = key == null ? \"All\" : (dim === \"branch\" ? shortBranch(key) : key);\n      const bucketLabel = bucketIdx >= 0 ? (\" · \" + BUCKET_LABELS[bucketIdx]) : \"\";\n      this.openDrill(DIM_NAMES[dim], keyLabel + bucketLabel, recs);\n    };\n\n    // ---- build a breakdown table (was the BreakdownTable child component) ----\n    const PAL5 = [\"#2E9E66\", \"#8FBE52\", \"#E2A33A\", \"#D2603C\", \"#9E2B36\"];\n    const LAB5 = [\"0–3d\", \"4–7d\", \"8–14d\", \"15–29d\", \"30d+\"];\n    const ACCENT = \"#3E6CA8\", ACCENT_TINT = \"rgba(62,108,168,0.10)\", DIMC = \"#C7C1B2\", INKC = \"#1B2330\", MUTEDC = \"#79808C\";\n    const HEAD_BASE = { name: MUTEDC, b0: \"#2E9E66\", b1: \"#2E9E66\", b2: \"#C98A2E\", b3: \"#D2603C\", b4: \"#9E2B36\", avg: MUTEDC, count: MUTEDC, pct: MUTEDC };\n\n    const buildTable = (dim, title, subtitle, dimLabel, shorten) => {\n      const src = group(dim, subsetExcept(dim), shorten);\n      const sel = F[dim] || [];\n      const sortS = SORT[dim] || { key: \"count\", dir: \"desc\" };\n      const onDrill = makeDrillHandler(dim);\n      const mkDrill = (key, idx, count) => (count > 0) ? (e) => { stop(e); onDrill(key, idx); } : null;\n      const cell = (v, col) => (v === 0 ? DIMC : col);\n\n      const valOf = (r, key) => {\n        if (key === \"name\") return String(r.name || \"\").toLowerCase();\n        if (key === \"count\") return r.count || 0;\n        if (key === \"avg\") return r.avg == null ? -1 : r.avg;\n        if (key === \"pct\") return r.pct == null ? -1 : r.pct;\n        if (key[0] === \"b\") return (r.buckets || [])[Number(key.slice(1))] || 0;\n        return 0;\n      };\n      const sorted = src.slice().sort((a, b) => {\n        const va = valOf(a, sortS.key), vb = valOf(b, sortS.key);\n        if (va < vb) return sortS.dir === \"asc\" ? -1 : 1;\n        if (va > vb) return sortS.dir === \"asc\" ? 1 : -1;\n        return (b.count || 0) - (a.count || 0);\n      });\n\n      const rows = sorted.map((r) => {\n        const b = r.buckets;\n        const tt = r.count || 1;\n        const segs = b.map((c, i) => ({ w: (c / tt * 100).toFixed(3) + \"%\", color: PAL5[i], label: LAB5[i] + \": \" + c }));\n        const isSel = sel.indexOf(r.key) !== -1;\n        const o = {\n          name: r.name, count: r.count,\n          avgStr: r.avg == null ? \"—\" : Math.round(r.avg),\n          pctStr: Math.round(r.pct) + \"%\", pctColor: pctColor(r.pct), segs,\n          c0: b[0], c1: b[1], c2: b[2], c3: b[3], c4: b[4],\n          c0col: cell(b[0], INKC), c1col: cell(b[1], INKC), c2col: cell(b[2], INKC),\n          c3col: cell(b[3], \"#D2603C\"), c4col: cell(b[4], \"#9E2B36\"),\n          onToggle: () => this.toggleFilter(dim, r.key),\n          dAll: (e) => { stop(e); onDrill(r.key, -1); },\n          check: isSel ? \"✓\" : \"\", boxBg: isSel ? ACCENT : \"transparent\", boxBorder: isSel ? ACCENT : DIMC,\n          rowBg: isSel ? ACCENT_TINT : \"transparent\", accentBar: isSel ? ACCENT : \"transparent\",\n        };\n        for (let i = 0; i < 5; i++) {\n          o[\"d\" + i] = mkDrill(r.key, i, b[i]);\n          o[\"cur\" + i] = b[i] > 0 ? \"pointer\" : \"default\";\n          o[\"ul\" + i] = b[i] > 0 ? \"underline\" : \"none\";\n          o[\"t\" + i] = b[i] > 0 ? (\"See \" + b[i] + \" issue(s) · \" + LAB5[i]) : \"\";\n        }\n        return o;\n      });\n\n      const tb = [0, 0, 0, 0, 0];\n      let tCount = 0, tAgeSum = 0;\n      src.forEach((r) => { r.buckets.forEach((c, i) => { tb[i] += c; }); tCount += r.count; tAgeSum += r.avg * r.count; });\n      const tPct = tCount ? (tb[0] + tb[1] + tb[2]) / tCount * 100 : 0;\n      const tot = {\n        c0: tb[0], c1: tb[1], c2: tb[2], c3: tb[3], c4: tb[4], count: tCount,\n        avgStr: tCount ? Math.round(tAgeSum / tCount) : \"—\",\n        pctStr: Math.round(tPct) + \"%\", pctColor: pctColor(tPct),\n        dAll: (e) => { stop(e); onDrill(null, -1); },\n      };\n      for (let i = 0; i < 5; i++) {\n        tot[\"d\" + i] = mkDrill(null, i, tb[i]);\n        tot[\"cur\" + i] = tb[i] > 0 ? \"pointer\" : \"default\";\n        tot[\"ul\" + i] = tb[i] > 0 ? \"underline\" : \"none\";\n        tot[\"t\" + i] = tb[i] > 0 ? (\"See \" + tb[i] + \" issue(s) · \" + LAB5[i]) : \"\";\n      }\n\n      const arrowFor = (key) => (sortS.key === key ? (sortS.dir === \"asc\" ? \" ▲\" : \" ▼\") : \"\");\n      const colorFor = (key) => (sortS.key === key ? ACCENT : HEAD_BASE[key]);\n      const selCount = sel.length;\n\n      return {\n        id: dim, title, subtitle, dimLabel, rows, tot,\n        hasSel: selCount > 0,\n        onClear: () => this.clearDim(dim),\n        totLabel: selCount > 0 ? \"Selected\" : \"All\",\n        rowCountLabel: selCount > 0 ? (selCount + \" selected · \" + rows.length + \" shown\") : (rows.length + \" rows · click a number to see projects\"),\n        sName: () => this.sortBy(dim, \"name\"), aName: arrowFor(\"name\"), cName: colorFor(\"name\"),\n        sB0: () => this.sortBy(dim, \"b0\"), aB0: arrowFor(\"b0\"), cB0: colorFor(\"b0\"),\n        sB1: () => this.sortBy(dim, \"b1\"), aB1: arrowFor(\"b1\"), cB1: colorFor(\"b1\"),\n        sB2: () => this.sortBy(dim, \"b2\"), aB2: arrowFor(\"b2\"), cB2: colorFor(\"b2\"),\n        sB3: () => this.sortBy(dim, \"b3\"), aB3: arrowFor(\"b3\"), cB3: colorFor(\"b3\"),\n        sB4: () => this.sortBy(dim, \"b4\"), aB4: arrowFor(\"b4\"), cB4: colorFor(\"b4\"),\n        sAvg: () => this.sortBy(dim, \"avg\"), aAvg: arrowFor(\"avg\"), cAvg: colorFor(\"avg\"),\n        sTotal: () => this.sortBy(dim, \"count\"), aTotal: arrowFor(\"count\"), cTotal: colorFor(\"count\"),\n        sPct: () => this.sortBy(dim, \"pct\"), aPct: arrowFor(\"pct\"), cPct: colorFor(\"pct\"),\n      };\n    };\n\n    const tables = [\n      buildTable(\"type\", \"Sales Issue Type\", \"by action / status\", \"type\"),\n      buildTable(\"cra\", \"Client Relations Agent\", \"who resolves fastest\", \"agent\"),\n      buildTable(\"branch\", \"Branch\", \"by install branch\", \"branch\", shortBranch),\n    ];\n\n    const drillState = this.state.drill;\n    let drillView = null;\n    if (drillState) {\n      const dr = drillState.records || [];\n      const avg = dr.length ? Math.round(dr.reduce((a, r) => a + r.actionAge, 0) / dr.length) : 0;\n      drillView = {\n        kicker: drillState.kicker,\n        title: drillState.title,\n        countLabel: dr.length + (dr.length === 1 ? \" project\" : \" projects\"),\n        avgStr: avg,\n        rows: dr.map((r) => ({\n          age: r.actionAge, ageColor: ageColorOf(r.actionAge),\n          homeowner: r.homeowner || r.id || \"—\",\n          id: r.id || \"—\", projectAge: r.projectAge,\n          type: r.type, cra: r.cra, branch: shortBranch(r.branch),\n        })),\n      };\n    }\n\n    const worst = [...RECS].sort((a, b) => b.actionAge - a.actionAge).slice(0, 10).map((r) => ({\n      age: r.actionAge,\n      ageColor: HPAL[hIdx(r.actionAge)],\n      homeowner: r.homeowner || r.id || \"—\",\n      type: r.type, cra: r.cra, branch: shortBranch(r.branch),\n    }));\n\n    const onTarget = p14 >= TARGET;\n    const dimNames = { type: \"Type\", cra: \"Agent\", branch: \"Branch\" };\n    const chipLabel = (dim, key) => (dim === \"branch\" ? shortBranch(key) : key);\n    const filterChips = [];\n    [\"type\", \"cra\", \"branch\"].forEach((dim) => {\n      (F[dim] || []).forEach((key) => {\n        filterChips.push({ dim: dimNames[dim], label: chipLabel(dim, key), onRemove: () => this.toggleFilter(dim, key) });\n      });\n    });\n\n    return {\n      fileName: this.state.fileName,\n      asOf: this.state.asOf,\n      error: this.state.error,\n      uploadLabel: this.state.loading ? \"Reading…\" : \"Replace weekly data\",\n      allCount, heroTotal: total, total, c14,\n      pct14Str: p14.toFixed(1) + \"%\",\n      statusText: onTarget ? \"On target\" : \"Below target\",\n      within14Color: pctColor(p14),\n      statusDot: onTarget ? \"#2E9E66\" : \"#C0503B\",\n      statusBg: onTarget ? \"rgba(46,158,102,0.12)\" : \"rgba(192,80,59,0.1)\",\n      statusBorder: onTarget ? \"rgba(46,158,102,0.35)\" : \"rgba(192,80,59,0.35)\",\n      dist, kpis, tables, worst,\n      hasFilters: filterChips.length > 0, filterChips, filteredCount: total,\n      drillOpen: !!drillView,\n      drill: drillView || { kicker: \"\", title: \"\", countLabel: \"\", avgStr: 0, rows: [] },\n      closeDrill: this.closeDrill,\n      clearAll: this.clearAll,\n      onFile: this.onFile,\n      resetData: this.resetData,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
